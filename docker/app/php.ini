; Custom PHP configuration for CodePilot AI

; Increase upload limits
upload_max_filesize = 20M
post_max_size = 20M

; Increase memory limit
memory_limit = 512M

; Increase execution time for AI processing
max_execution_time = 300
max_input_time = 300

; Enable opcache for performance
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1

; Redis session handler (optional)
; session.save_handler = redis
; session.save_path = "tcp://redis:6379?auth=codepilot_redis"

; Error reporting
error_reporting = E_ALL
display_errors = Off
log_errors = On
error_log = /var/www/storage/logs/php_error.log

; Timezone
date.timezone = UTC
