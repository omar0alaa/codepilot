# Redis configuration for CodePilot AI

# Network
bind 0.0.0.0
port 6379
requirepass codepilot_redis

# Persistence
appendonly yes
appendfsync everysec

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# Logging
loglevel notice
logfile /var/log/redis/redis.log

# Snapshotting
save 900 1
save 300 10
save 60 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
